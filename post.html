<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="JW Labs research post." />
  <title>JW Labs Post</title>
  <link rel="stylesheet" href="./styles.css" />
</head>

<body class="site" data-page="article">
  <div class="page">
    <div class="layout">
      <aside class="sidebar" aria-label="Site">
        <a class="logo" href="./index.html">JW LABS</a>
        <nav class="sidebar-nav">
          <a class="nav-link is-active" href="./index.html">Research</a>
          <a class="nav-link" href="./team.html">Team</a>
        </nav>
        <nav id="article-toc" class="article-toc" aria-label="On this page" hidden>
          <p class="toc-label">On this page</p>
          <div class="toc-scroll"></div>
        </nav>
      </aside>

      <main class="main text-content">
        <article id="post" class="blog-content" aria-live="polite"></article>
      </main>
    </div>

    <footer class="site-footer">
      <p class="footer-copy">© JW Labs</p>
      <div class="footer-links">
        <a href="https://github.com/jwlaboratory/" target="_blank" rel="noopener noreferrer">GitHub</a>
        <span class="footer-link-tbd">Email</span>
        <span class="footer-link-tbd">X</span>
      </div>
    </footer>
  </div>

  <template id="article-template">
    <header class="blog-header">
      <h1 class="blog-title"></h1>
    </header>
    <div class="blogmetadata" hidden>
      <div class="blog-date"></div>
      <div class="blog-author"></div>
    </div>
    <div id="abstract" class="blog-abstract" hidden></div>
    <div class="blog-body"></div>
  </template>

  <script src="./content/blogs.js"></script>
  <script src="./scripts/render-blog.js"></script>
</body>

</html>
